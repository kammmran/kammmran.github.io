<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamran Heydarov - Listen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/podcast.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h3>Kamran Heydarov</h3>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link"><span>Projects</span></a>
                </li>
                <li class="nav-item">
                    <a href="../podcast.html" class="nav-link active"><span>Podcast</span></a>
                </li>
                <li class="nav-item">
                    <a href="../cv.html" class="nav-link"><span>CV</span></a>
                </li>
                <li class="nav-item">
                    <a href="../contact.html" class="nav-link"><span>Contact</span></a>
                </li>
            </ul>
        </div>
    </nav>
    <main class="main-content podcast-main">
        <section class="listen-stage">
            <div class="listen-stage-bg" id="listen-bg"></div>
            <div class="listen-stage-overlay"></div>
            <div class="listen-stage-inner">
                <a href="../podcast.html" class="podcast-back">← All episodes</a>
                <div class="listen-card">
                    <div class="listen-cover-wrap">
                        <div id="listen-cover" class="listen-cover"></div>
                        <div id="listen-eq" class="listen-eq" aria-hidden="true">
                            <span></span><span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <div class="listen-info">
                        <span id="listen-epnum" class="podcast-eyebrow podcast-eyebrow-light"></span>
                        <h1 id="listen-title" class="listen-title">Loading…</h1>
                        <div id="listen-sub" class="listen-sub"></div>

                        <div class="listen-player">
                            <button id="listen-play" class="listen-play-btn" type="button" aria-label="Play">
                                <svg id="listen-play-icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                <svg id="listen-pause-icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" style="display:none;"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
                            </button>
                            <div class="listen-progress-wrap">
                                <div class="listen-time" id="listen-current">0:00</div>
                                <div class="listen-progress" id="listen-progress">
                                    <div class="listen-progress-fill" id="listen-progress-fill"></div>
                                </div>
                                <div class="listen-time" id="listen-duration">0:00</div>
                            </div>
                        </div>

                        <div class="listen-actions">
                            <a id="listen-detail-link" href="#" class="podcast-action">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 7V3.5L18.5 9H13z"/></svg>
                                Read shownotes <span aria-hidden="true">→</span>
                            </a>
                            <a id="listen-watch-link" href="#" class="podcast-action" target="_blank" rel="noopener" style="display:none;">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                Watch on YouTube <span aria-hidden="true">→</span>
                            </a>
                        </div>
                    </div>
                </div>

                <audio id="listen-audio" preload="metadata"></audio>
            </div>
        </section>
    </main>
    <script src="../js/podcast.js"></script>
</body>
</html>
