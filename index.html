<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamran Heydarov - Projects</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .project-container {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            margin: 0 auto;
            padding-top: 20px;
            text-align: left;
        }
        .project-sidebar {
            width: 250px;
            flex-shrink: 0;
            background-color: transparent;
            padding: 0;
        }
        .year-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .project-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .project-post-content {
            width: 100%;
        }
        .project-content-text {
            text-align: left;
            width: 100%;
        }
        .project-header {
            text-align: left;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .year-section a {
            display: block;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .year-section a:hover {
            background: #f1f3f5;
            border-left-color: #000;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h3>Kamran Heydarov</h3>
            </div>
            <ul class="nav-menu">
                                <li class="nav-item">
                    <a href="index.html" class="nav-link active"><span>Projects</span></a>
                </li>
                <li class="nav-item">
                    <a href="cv.html" class="nav-link"><span>CV</span></a>
                </li>
                <li class="nav-item">
                    <a href="contact.html" class="nav-link"><span>Contact</span></a>
                </li>
            </ul>
        </div>
    </nav>
    <main class="main-content">
        <div class="content-container" id="content-container">
            <div class="project-container">
                <aside class="project-sidebar">
                    <div id="project-menu" class="year-menu"></div>
                </aside>
                <main id="project-content" class="project-content"></main>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
